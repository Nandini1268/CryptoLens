<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { 
      width: 280px; 
      padding: 15px; 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fff;
      margin: 0;
    }
    body.dark-mode { 
      background: #1a1a1b; 
      color: white; 
    }
    h3 { 
      margin: 0 0 15px 0; 
      font-size: 18px;
      text-align: center;
      color: #4CAF50;
    }
    .row { 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      margin-bottom: 15px;
      padding: 8px 0;
    }
    select, button { 
      padding: 6px 10px; 
      border-radius: 6px; 
      border: 1px solid #ccc;
      font-size: 13px;
    }
    body.dark-mode select, 
    body.dark-mode button { 
      background: #2a2a2b; 
      color: white; 
      border-color: #444;
    }
    button { 
      cursor: pointer;
      background: #f0f0f0;
    }
    button:hover {
      background: #e0e0e0;
    }
    body.dark-mode button:hover {
      background: #3a3a3b;
    }
    .status { 
      font-size: 11px; 
      color: #666; 
      margin-top: 10px; 
      text-align: center;
      padding: 5px;
    }
    .section {
      border-top: 1px solid #eee;
      margin-top: 15px;
      padding-top: 15px;
    }
    body.dark-mode .section {
      border-top-color: #333;
    }
    .alert-item {
      background: #f5f5f5;
      padding: 8px;
      margin: 8px 0;
      border-radius: 6px;
      font-size: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    body.dark-mode .alert-item {
      background: #2a2a2b;
    }
    .delete-alert {
      cursor: pointer;
      color: #e11d48;
      font-size: 16px;
      padding: 0 5px;
    }
    .no-alerts {
      text-align: center;
      color: #888;
      font-size: 12px;
      padding: 10px;
    }
  </style>
</head>
<body>
  <h3>🔍 CryptoLens Pro</h3>
  
  <div class="row">
    <span>💰 Currency</span>
    <select id="currSelect">
      <option value="usd">USD ($)</option>
      <option value="eur">EUR (€)</option>
      <option value="inr">INR (₹)</option>
    </select>
  </div>
  
  <div class="row">
    <span>🌙 Dark Mode</span>
    <input type="checkbox" id="darkToggle">
  </div>
  
  <div class="section">
    <div style="margin-bottom: 10px;">
      <span>🔔 Active Alerts</span>
    </div>
    <div id="alerts-list"></div>
  </div>
  
  <div class="status" id="status">✓ Ready - Hover over crypto names</div>
  <script src="popup.js"></script>
</body>
</html>
